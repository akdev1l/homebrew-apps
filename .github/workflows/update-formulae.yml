name: Update Formulae

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "templates/**"

jobs:
  update:
    runs-on: ubuntu-latest
    container: fedora:latest
    permissions:
      contents: write
      actions: read
      pull-requests: write

    steps:
      - name: Install dependencies
        run: dnf install -y ansible git nodejs gh

      - uses: actions/checkout@v4

      - name: Run playbook
        run: ansible-playbook generate-formulae.yml

      - name: Open PR with changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/
          git diff --cached --quiet && echo "No changes, skipping PR." && exit 0
          BRANCH="chore/update-formulae-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: update formulae"
          git push origin "$BRANCH"
          gh pr create --title "chore: update formulae" --body "Automated formula update." --base master --head "$BRANCH"
