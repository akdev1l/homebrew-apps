name: Update Formulae

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "templates/**"

jobs:
  update:
    runs-on: ubuntu-latest
    container: fedora:latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Install dependencies
        run: dnf install -y ansible git nodejs

      - uses: actions/checkout@v4

      - name: Run playbook
        run: ansible-playbook generate-formulae.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/
          git diff --cached --quiet || git commit -m "chore: update formulae"
          git push
